<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表情包生成器</title>
    <!-- gif.js 用于 GIF 生成 -->
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.min.js">
    </script>
    <style>
        /* 全局重置 & 粉色透明主题 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffe8ee 0%, #ffd9e2 50%, #ffc8d4 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            max-width: 1360px;
            width: 100%;
            background: rgba(255, 245, 247, 0.60);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px;
            padding: 28px 32px 32px;
            box-shadow: 0 20px 60px rgba(255, 150, 180, 0.20);
            border: 1px solid rgba(255, 255, 255, 0.50);
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-left .icon {
            font-size: 32px;
        }
        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            color: #6b3a4a;
            background: linear-gradient(135deg, #d45a7a, #b84a6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-right {
            font-size: 16px;
            color: #7a4e5e;
            background: rgba(255, 255, 255, 0.55);
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }
        .header-right span {
            color: #b45374;
            font-weight: 600;
        }

        /* 主布局：预览区 + 右侧信息（文字列表） */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 24px;
            margin-bottom: 20px;
        }

        /* 预览区 */
        .preview-area {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.60);
            backdrop-filter: blur(4px);
        }

        .preview-area .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6px 10px 6px;
            font-size: 14px;
            color: #7a4e5e;
            font-weight: 500;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: rgba(255, 240, 244, 0.40);
            border-radius: 20px;
            overflow: hidden;
            border: 2px dashed rgba(255, 150, 180, 0.30);
        }

        .canvas-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 18px;
            background: #fff9fa;
            cursor: default;
        }

        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #b58a9a;
            font-size: 16px;
            pointer-events: none;
            text-align: center;
            opacity: 0.7;
        }
        .placeholder-text .big {
            font-size: 42px;
            display: block;
        }

        /* 右侧文字列表 */
        .text-sidebar {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 28px;
            padding: 16px 14px;
            border: 1px solid rgba(255, 255, 255, 0.60);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
        }

        .text-sidebar .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: #6b3a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .text-sidebar .sidebar-title .badge {
            background: rgba(255, 255, 255, 0.5);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #8a5a6a;
        }
        .text-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }
        .text-list::-webkit-scrollbar {
            width: 4px;
        }
        .text-list::-webkit-scrollbar-thumb {
            background: #ffb0c0;
            border-radius: 8px;
        }

        .text-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 180, 195, 0.3);
            border-radius: 30px;
            padding: 4px 12px 4px 16px;
            font-size: 13px;
            color: #4a2a3a;
            cursor: pointer;
            transition: all 0.15s;
            min-height: 34px;
        }
        .text-tag:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: #ff8da1;
        }
        .text-tag.active-tag {
            background: rgba(255, 140, 170, 0.20);
            border-color: #ff8da1;
            box-shadow: 0 0 0 2px rgba(255, 140, 170, 0.15);
        }
        .text-tag .tag-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .text-tag .tag-del {
            font-size: 16px;
            color: #b58a9a;
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s;
        }
        .text-tag .tag-del:hover {
            color: #d45a7a;
        }

        /* 功能按钮栏 */
        .function-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 180, 195, 0.25);
        }

        .function-tabs .tab-btn {
            padding: 8px 24px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.35);
            color: #6b3a4a;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            backdrop-filter: blur(4px);
        }

        .function-tabs .tab-btn:hover {
            background: rgba(255, 255, 255, 0.6);
        }
        .function-tabs .tab-btn.active {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 140, 170, 0.3);
            box-shadow: 0 2px 12px rgba(255, 130, 160, 0.08);
            color: #b45374;
        }

        /* 功能面板容器 */
        .panel-container {
            background: rgba(255, 255, 255, 0.30);
            border-radius: 28px;
            padding: 20px 24px 24px;
            border: 1px solid rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(4px);
            min-height: 200px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .panel-content {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .panel-content.active {
            display: block;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0.4;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-content .panel-title {
            font-size: 15px;
            font-weight: 600;
            color: #6b3a4a;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 贴文字面板 */
        .text-input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .text-input-row input[type="text"] {
            flex: 1;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 180, 195, 0.4);
            background: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            color: #4a2a3a;
            outline: none;
            transition: all 0.2s;
            min-width: 140px;
        }
        .text-input-row input[type="text"]:focus {
            border-color: #ff8da1;
            box-shadow: 0 0 0 3px rgba(255, 140, 170, 0.15);
            background: rgba(255, 255, 255, 0.8);
        }
        .text-input-row .add-text-btn {
            padding: 8px 22px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #ff8da1, #f5728a);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .text-input-row .add-text-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 16px rgba(255, 100, 130, 0.3);
        }

        .style-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            align-items: center;
            margin-bottom: 8px;
        }
        .style-row .color-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #6b3a4a;
        }
        .style-row .color-group input[type="color"] {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            padding: 0;
            cursor: pointer;
            background: none;
        }
        .style-row .color-group input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .style-row .color-group input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }
        .style-row .toggle-group {
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 200, 210, 0.2);
        }
        .style-row .toggle-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #6b3a4a;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .style-row .toggle-group input[type="checkbox"] {
            accent-color: #ff8da1;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .style-row .font-size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #6b3a4a;
        }
        .style-row .font-size-control input[type="range"] {
            width: 120px;
            accent-color: #ff8da1;
            cursor: pointer;
        }
        .style-row .font-size-control .size-label {
            min-width: 32px;
            text-align: center;
            font-weight: 500;
            color: #b45374;
        }

        /* 导出设置面板 */
        .size-quality-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 30px;
            margin-bottom: 14px;
        }
        .size-quality-row .group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .size-quality-row .group .label {
            font-size: 13px;
            color: #6b3a4a;
            font-weight: 500;
        }
        .size-quality-row .group .btn-group {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.3);
            padding: 3px;
            border-radius: 30px;
            border: 1px solid rgba(255, 200, 210, 0.2);
        }
        .size-quality-row .group .btn-group .opt-btn {
            padding: 4px 16px;
            border: none;
            border-radius: 30px;
            background: transparent;
            font-size: 12px;
            font-weight: 500;
            color: #6b3a4a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .size-quality-row .group .btn-group .opt-btn.active {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 2px 8px rgba(255, 130, 160, 0.15);
            color: #b45374;
        }
        .size-quality-row .group .btn-group .opt-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.3);
        }

        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .action-row .primary-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #ff8da1, #f5728a);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(255, 100, 130, 0.20);
        }
        .action-row .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 100, 130, 0.30);
        }
        .action-row .primary-btn.outline {
            background: rgba(255, 255, 255, 0.5);
            color: #6b3a4a;
            box-shadow: none;
            border: 1px solid rgba(255, 180, 195, 0.4);
        }
        .action-row .primary-btn.outline:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        /* GIF 面板 */
        .gif-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px 24px;
        }
        .gif-controls .file-input-wrap {
            position: relative;
            display: inline-block;
        }
        .gif-controls .file-input-wrap input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            top: 0;
            left: 0;
        }
        .gif-controls .file-input-wrap .fake-btn {
            padding: 7px 22px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 180, 195, 0.3);
            font-size: 13px;
            color: #6b3a4a;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .gif-controls .file-input-wrap .fake-btn:hover {
            background: rgba(255, 255, 255, 0.85);
            border-color: #ff8da1;
        }
        .gif-controls .gif-status {
            font-size: 13px;
            color: #7a4e5e;
            flex: 1;
            min-width: 120px;
        }
        .gif-controls .gif-status .file-name {
            color: #b45374;
            font-weight: 500;
        }
        .gif-controls .gif-size-select {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .gif-controls .gif-size-select .label {
            font-size: 13px;
            color: #6b3a4a;
        }
        .gif-controls .gif-size-select select {
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 180, 195, 0.3);
            background: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            color: #4a2a3a;
            outline: none;
            cursor: pointer;
        }
        .gif-controls .gif-gen-btn {
            padding: 7px 28px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #a8d8ea, #7ac0d4);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(100, 180, 200, 0.20);
        }
        .gif-controls .gif-gen-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(100, 180, 200, 0.30);
        }
        .gif-controls .gif-gen-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 仓库面板 */
        .warehouse-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        .warehouse-toolbar .wh-info {
            font-size: 13px;
            color: #7a4e5e;
            flex: 1;
        }
        .warehouse-toolbar .wh-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .warehouse-toolbar .wh-actions button {
            padding: 5px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 180, 195, 0.3);
            background: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            color: #6b3a4a;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .warehouse-toolbar .wh-actions button:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: #ff8da1;
        }
        .warehouse-toolbar .wh-actions button.danger {
            color: #d45a7a;
            border-color: #f5b0b0;
        }
        .warehouse-toolbar .wh-actions button.danger:hover {
            background: rgba(255, 100, 130, 0.15);
        }

        .wh-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
            max-height: 280px;
            overflow-y: auto;
            padding: 4px 2px 8px;
        }
        .wh-grid::-webkit-scrollbar {
            width: 4px;
        }
        .wh-grid::-webkit-scrollbar-thumb {
            background: #ffb0c0;
            border-radius: 8px;
        }

        .wh-item {
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            aspect-ratio: 1/1;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(255, 130, 160, 0.06);
            cursor: pointer;
        }
        .wh-item:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(255, 130, 160, 0.12);
        }
        .wh-item img,
        .wh-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .wh-item .wh-check {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 22px;
            height: 22px;
            accent-color: #ff8da1;
            cursor: pointer;
            z-index: 2;
            opacity: 0.8;
        }
        .wh-item .wh-del {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 14px;
            line-height: 22px;
            text-align: center;
            color: #b45374;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 0;
            z-index: 2;
        }
        .wh-item:hover .wh-del {
            opacity: 1;
        }
        .wh-item .wh-del:hover {
            background: rgba(255, 200, 210, 0.8);
        }
        .wh-item .wh-download {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            line-height: 24px;
            text-align: center;
            color: #6b3a4a;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 0;
            z-index: 2;
        }
        .wh-item:hover .wh-download {
            opacity: 1;
        }
        .wh-item .wh-download:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .wh-empty {
            color: #b58a9a;
            font-size: 14px;
            text-align: center;
            padding: 40px 0;
            grid-column: 1 / -1;
        }

        /* toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(60, 30, 40, 0.80);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 32px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 999;
            border: 1px solid rgba(255, 255, 255, 0.10);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .text-sidebar {
                max-height: 200px;
            }
            .app-container {
                padding: 18px;
            }
        }
        @media (max-width: 600px) {
            .app-container {
                padding: 12px;
                border-radius: 28px;
            }
            .header-left h1 {
                font-size: 22px;
            }
            .function-tabs .tab-btn {
                padding: 6px 16px;
                font-size: 13px;
            }
            .panel-container {
                padding: 16px;
            }
            .style-row {
                gap: 8px;
            }
            .style-row .font-size-control input[type="range"] {
                width: 80px;
            }
            .wh-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="app-container">

        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <span class="icon">🌸</span>
                <h1>表情包生成器</h1>
            </div>
            <div class="header-right">✦ 制作人：<span>KIKI</span></div>
        </header>

        <!-- 主布局：预览 + 文字侧边栏 -->
        <div class="main-layout">
            <!-- 预览区 -->
            <div class="preview-area">
                <div class="label-row">
                    <span>🖼️ 预览区</span>
                    <span class="badge">点击文字选中 · 拖拽移动</span>
                </div>
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="mainCanvas" width="600" height="600"></canvas>
                    <div class="placeholder-text" id="placeholderText">
                        <span class="big">📷</span>
                        上传图片或添加文字
                    </div>
                </div>
            </div>

            <!-- 文字侧边栏 -->
            <div class="text-sidebar">
                <div class="sidebar-title">
                    <span>📝 文字列表</span>
                    <span class="badge" id="textCount">0</span>
                </div>
                <div class="text-list" id="textList"></div>
                <div style="font-size:11px; color:#b58a9a; text-align:center; padding-top:4px;">
                    点击文字选中，拖拽预览区移动
                </div>
            </div>
        </div>

        <!-- 功能切换标签 -->
        <div class="function-tabs" id="functionTabs">
            <button class="tab-btn active" data-tab="text">✏️ 贴文字</button>
            <button class="tab-btn" data-tab="export">📐 导出设置</button>
            <button class="tab-btn" data-tab="gif">🎬 GIF制作</button>
            <button class="tab-btn" data-tab="warehouse">📦 仓库</button>
        </div>

        <!-- 功能面板容器 -->
        <div class="panel-container">

            <!-- 贴文字面板 -->
            <div class="panel-content active" id="panel-text">
                <div class="panel-title">✏️ 贴文字</div>
                <div class="text-input-row">
                    <input type="text" id="textInput" placeholder="输入文字，按 Enter 添加" maxlength="30" />
                    <button class="add-text-btn" id="addTextBtn">添加</button>
                </div>
                <div class="style-row">
                    <div class="color-group">
                        <span>颜色</span>
                        <input type="color" id="textColor" value="#d45a7a" />
                    </div>
                    <div class="color-group">
                        <span>描边</span>
                        <input type="color" id="strokeColor" value="#ffffff" />
                    </div>
                    <div class="toggle-group">
                        <label><input type="checkbox" id="boldCheck" /> 粗体</label>
                        <label><input type="checkbox" id="strokeCheck" /> 描边</label>
                    </div>
                    <div class="font-size-control">
                        <span>字号</span>
                        <input type="range" id="fontSizeSlider" min="16" max="80" value="32" step="1" />
                        <span class="size-label" id="fontSizeLabel">32</span>
                    </div>
                </div>
                <div style="font-size:12px; color:#b58a9a; margin-top:4px;">💡 选中文字后调整样式，拖拽预览区文字移动位置</div>
            </div>

            <!-- 导出设置面板 -->
            <div class="panel-content" id="panel-export">
                <div class="panel-title">📐 导出设置</div>
                <div class="size-quality-row">
                    <div class="group">
                        <span class="label">尺寸</span>
                        <div class="btn-group" id="sizeGroup">
                            <button class="opt-btn" data-value="120">小</button>
                            <button class="opt-btn active" data-value="240">中</button>
                            <button class="opt-btn" data-value="480">大</button>
                        </div>
                    </div>
                    <div class="group">
                        <span class="label">质量</span>
                        <div class="btn-group" id="qualityGroup">
                            <button class="opt-btn" data-value="lossless">无损</button>
                            <button class="opt-btn active" data-value="compressed">压缩</button>
                            <button class="opt-btn" data-value="low">渣图</button>
                        </div>
                    </div>
                </div>
                <div class="action-row">
                    <button class="primary-btn" id="exportBtn">💾 导出表情</button>
                    <button class="primary-btn outline" id="saveToWarehouseBtn">📦 存到仓库</button>
                </div>
            </div>

            <!-- GIF 制作面板 -->
            <div class="panel-content" id="panel-gif">
                <div class="panel-title">🎬 GIF 制作</div>
                <div class="gif-controls">
                    <div class="file-input-wrap">
                        <input type="file" id="videoUpload" accept="video/*" />
                        <div class="fake-btn">📹 上传视频</div>
                    </div>
                    <div class="gif-status" id="gifStatus">未选择视频</div>
                    <div class="gif-size-select">
                        <span class="label">尺寸</span>
                        <select id="gifSizeSelect">
                            <option value="120">小 120</option>
                            <option value="240" selected>中 240</option>
                            <option value="480">大 480</option>
                        </select>
                    </div>
                    <button class="gif-gen-btn" id="genGifBtn">⚡ 生成 GIF</button>
                </div>
            </div>

            <!-- 仓库面板 -->
            <div class="panel-content" id="panel-warehouse">
                <div class="panel-title">📦 表情仓库</div>
                <div class="warehouse-toolbar">
                    <span class="wh-info" id="whCount">共 0 个</span>
                    <div class="wh-actions">
                        <button id="downloadSelectedBtn">⬇️ 下载选中</button>
                        <button class="danger" id="deleteSelectedBtn">🗑️ 删除选中</button>
                        <button id="clearWarehouseBtn">清空全部</button>
                    </div>
                </div>
                <div class="wh-grid" id="whGrid">
                    <div class="wh-empty">✨ 还没有表情，制作后存到这里吧</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ----- DOM 引用 -----
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');
            const placeholder = document.getElementById('placeholderText');

            const imageUpload = document.getElementById('imageUpload');
            const clearImageBtn = document.getElementById('clearImageBtn');

            const textInput = document.getElementById('textInput');
            const addTextBtn = document.getElementById('addTextBtn');
            const textColor = document.getElementById('textColor');
            const strokeColor = document.getElementById('strokeColor');
            const boldCheck = document.getElementById('boldCheck');
            const strokeCheck = document.getElementById('strokeCheck');
            const fontSizeSlider = document.getElementById('fontSizeSlider');
            const fontSizeLabel = document.getElementById('fontSizeLabel');
            const textList = document.getElementById('textList');
            const textCount = document.getElementById('textCount');

            const sizeGroup = document.getElementById('sizeGroup');
            const qualityGroup = document.getElementById('qualityGroup');
            const exportBtn = document.getElementById('exportBtn');
            const saveToWarehouseBtn = document.getElementById('saveToWarehouseBtn');

            const videoUpload = document.getElementById('videoUpload');
            const gifStatus = document.getElementById('gifStatus');
            const gifSizeSelect = document.getElementById('gifSizeSelect');
            const genGifBtn = document.getElementById('genGifBtn');

            const whGrid = document.getElementById('whGrid');
            const whCount = document.getElementById('whCount');
            const clearWarehouseBtn = document.getElementById('clearWarehouseBtn');
            const downloadSelectedBtn = document.getElementById('downloadSelectedBtn');
            const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');

            const toastEl = document.getElementById('toast');

            // 功能切换
            const tabBtns = document.querySelectorAll('.tab-btn');
            const panels = {
                text: document.getElementById('panel-text'),
                export: document.getElementById('panel-export'),
                gif: document.getElementById('panel-gif'),
                warehouse: document.getElementById('panel-warehouse')
            };

            // ----- 状态 -----
            const state = {
                image: null,
                imageDataURL: null,
                texts: [],
                nextId: 1,
                selectedId: null,
                dragging: false,
                dragTargetId: null,
                dragOffsetX: 0,
                dragOffsetY: 0,
                canvasSize: 600,
                exportSize: 240,
                quality: 'compressed',
                videoFile: null,
                videoURL: null,
                videoElement: null,
            };

            // ----- 工具 -----
            function showToast(msg, duration = 2600) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                clearTimeout(toastEl._timer);
                toastEl._timer = setTimeout(() => {
                    toastEl.classList.remove('show');
                }, duration);
            }

            // ----- 绘图核心 -----
            function drawScene() {
                const w = state.canvasSize;
                const h = state.canvasSize;
                ctx.clearRect(0, 0, w, h);

                // 背景
                const grad = ctx.createRadialGradient(w / 2, h / 2, 20, w / 2, h / 2, w * 0.7);
                grad.addColorStop(0, '#fff5f7');
                grad.addColorStop(1, '#fce8ee');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // 图片
                if (state.image) {
                    const img = state.image;
                    const iw = img.width;
                    const ih = img.height;
                    const scale = Math.min(w / iw, h / ih);
                    const dw = iw * scale;
                    const dh = ih * scale;
                    const dx = (w - dw) / 2;
                    const dy = (h - dh) / 2;
                    ctx.drawImage(img, dx, dy, dw, dh);
                }

                // 文字
                for (const t of state.texts) {
                    drawText(t);
                }

                placeholder.style.display = (state.image || state.texts.length > 0) ? 'none' : 'block';
            }

            function drawText(t) {
                const fontSize = t.fontSize || 32;
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let font = '';
                if (t.bold) font += 'bold ';
                font += fontSize + 'px "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif';
                ctx.font = font;

                if (t.stroke) {
                    ctx.lineWidth = Math.max(2, fontSize / 14);
                    ctx.strokeStyle = t.strokeColor || '#ffffff';
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    ctx.strokeText(t.text, t.x, t.y);
                }
                ctx.fillStyle = t.color || '#d45a7a';
                ctx.fillText(t.text, t.x, t.y);

                // 选中边框
                if (state.selectedId === t.id) {
                    const metrics = ctx.measureText(t.text);
                    const tw = metrics.width;
                    const th = fontSize * 1.2;
                    const pad = 8;
                    ctx.save();
                    ctx.strokeStyle = '#ff8da1';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 6]);
                    ctx.strokeRect(t.x - tw / 2 - pad, t.y - th / 2 - pad, tw + pad * 2, th + pad * 2);
                    ctx.restore();
                }
                ctx.restore();
            }

            function measureTextObj(t) {
                const fontSize = t.fontSize || 32;
                ctx.save();
                let font = '';
                if (t.bold) font += 'bold ';
                font += fontSize + 'px "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif';
                ctx.font = font;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const metrics = ctx.measureText(t.text);
                const width = metrics.width;
                const height = fontSize * 1.2;
                ctx.restore();
                return { width, height };
            }

            function hitTestText(mx, my) {
                for (let i = state.texts.length - 1; i >= 0; i--) {
                    const t = state.texts[i];
                    const size = measureTextObj(t);
                    const halfW = size.width / 2 + 12;
                    const halfH = size.height / 2 + 12;
                    if (mx >= t.x - halfW && mx <= t.x + halfW &&
                        my >= t.y - halfH && my <= t.y + halfH) {
                        return t.id;
                    }
                }
                return null;
            }

            // ----- 文字管理 -----
            function renderTextList() {
                textList.innerHTML = '';
                for (const t of state.texts) {
                    const tag = document.createElement('div');
                    tag.className = 'text-tag';
                    if (state.selectedId === t.id) tag.classList.add('active-tag');

                    const span = document.createElement('span');
                    span.className = 'tag-text';
                    span.textContent = t.text || '(空)';
                    tag.appendChild(span);

                    const del = document.createElement('span');
                    del.className = 'tag-del';
                    del.textContent = '×';
                    del.title = '删除';
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteText(t.id);
                    });
                    tag.appendChild(del);

                    tag.addEventListener('click', () => {
                        selectText(t.id);
                    });

                    textList.appendChild(tag);
                }
                textCount.textContent = state.texts.length;
            }

            function addText(text) {
                if (!text || text.trim() === '') {
                    showToast('请输入文字内容');
                    return;
                }
                const w = state.canvasSize;
                const h = state.canvasSize;
                const newText = {
                    id: state.nextId++,
                    text: text.trim(),
                    x: w / 2 + (Math.random() - 0.5) * 80,
                    y: h / 2 + (Math.random() - 0.5) * 80,
                    color: textColor.value,
                    bold: boldCheck.checked,
                    stroke: strokeCheck.checked,
                    strokeColor: strokeColor.value,
                    fontSize: parseInt(fontSizeSlider.value, 10) || 32,
                };
                state.texts.push(newText);
                selectText(newText.id);
                renderTextList();
                drawScene();
                showToast('✅ 已添加文字');
                textInput.value = '';
                textInput.focus();
            }

            function deleteText(id) {
                const idx = state.texts.findIndex(t => t.id === id);
                if (idx === -1) return;
                state.texts.splice(idx, 1);
                if (state.selectedId === id) {
                    state.selectedId = state.texts.length > 0 ? state.texts[state.texts.length - 1].id : null;
                }
                renderTextList();
                drawScene();
            }

            function selectText(id) {
                state.selectedId = id;
                const t = state.texts.find(t => t.id === id);
                if (t) {
                    textColor.value = t.color || '#d45a7a';
                    strokeColor.value = t.strokeColor || '#ffffff';
                    boldCheck.checked = t.bold || false;
                    strokeCheck.checked = t.stroke || false;
                    fontSizeSlider.value = t.fontSize || 32;
                    fontSizeLabel.textContent = t.fontSize || 32;
                }
                renderTextList();
                drawScene();
            }

            function updateSelectedStyle() {
                const t = state.texts.find(t => t.id === state.selectedId);
                if (!t) return;
                t.color = textColor.value;
                t.strokeColor = strokeColor.value;
                t.bold = boldCheck.checked;
                t.stroke = strokeCheck.checked;
                t.fontSize = parseInt(fontSizeSlider.value, 10) || 32;
                fontSizeLabel.textContent = t.fontSize;
                renderTextList();
                drawScene();
            }

            // ----- 图片 -----
            function loadImage(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        state.image = img;
                        state.imageDataURL = e.target.result;
                        drawScene();
                        showToast('✅ 图片已上传');
                    };
                    img.onerror = () => showToast('❌ 图片加载失败');
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            function clearImage() {
                state.image = null;
                state.imageDataURL = null;
                drawScene();
                showToast('已清除图片');
                imageUpload.value = '';
            }

            // ----- 导出 -----
            function getExportSettings() {
                let size = 240;
                const activeSize = sizeGroup.querySelector('.opt-btn.active');
                if (activeSize) size = parseInt(activeSize.dataset.value, 10);
                let quality = 'compressed';
                const activeQ = qualityGroup.querySelector('.opt-btn.active');
                if (activeQ) quality = activeQ.dataset.value;
                return { size, quality };
            }

            function exportImage() {
                const { size, quality } = getExportSettings();
                const offscreen = document.createElement('canvas');
                offscreen.width = size;
                offscreen.height = size;
                const offCtx = offscreen.getContext('2d');

                const srcSize = state.canvasSize;
                const scale = size / srcSize;

                // 背景
                const grad = offCtx.createRadialGradient(size / 2, size / 2, 10, size / 2, size / 2, size * 0.7);
                grad.addColorStop(0, '#fff5f7');
                grad.addColorStop(1, '#fce8ee');
                offCtx.fillStyle = grad;
                offCtx.fillRect(0, 0, size, size);

                if (state.image) {
                    const img = state.image;
                    const iw = img.width;
                    const ih = img.height;
                    const s = Math.min(size / iw, size / ih);
                    const dw = iw * s;
                    const dh = ih * s;
                    const dx = (size - dw) / 2;
                    const dy = (size - dh) / 2;
                    offCtx.drawImage(img, dx, dy, dw, dh);
                }

                for (const t of state.texts) {
                    const fs = Math.max(12, Math.round((t.fontSize || 32) * scale));
                    offCtx.save();
                    offCtx.textAlign = 'center';
                    offCtx.textBaseline = 'middle';
                    let font = '';
                    if (t.bold) font += 'bold ';
                    font += fs + 'px "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif';
                    offCtx.font = font;
                    const tx = t.x * scale;
                    const ty = t.y * scale;
                    if (t.stroke) {
                        offCtx.lineWidth = Math.max(1.5, fs / 14);
                        offCtx.strokeStyle = t.strokeColor || '#ffffff';
                        offCtx.lineJoin = 'round';
                        offCtx.lineCap = 'round';
                        offCtx.strokeText(t.text, tx, ty);
                    }
                    offCtx.fillStyle = t.color || '#d45a7a';
                    offCtx.fillText(t.text, tx, ty);
                    offCtx.restore();
                }

                let mimeType = 'image/png';
                let qualityParam = undefined;
                let ext = 'png';
                if (quality === 'lossless') {
                    mimeType = 'image/png';
                    ext = 'png';
                } else if (quality === 'compressed') {
                    mimeType = 'image/jpeg';
                    qualityParam = 0.75;
                    ext = 'jpg';
                } else {
                    mimeType = 'image/jpeg';
                    qualityParam = 0.30;
                    ext = 'jpg';
                }

                offscreen.toBlob((blob) => {
                    if (!blob) { showToast('❌ 导出失败'); return; }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const label = quality === 'lossless' ? '无损' : (quality === 'compressed' ? '压缩' : '渣图');
                    a.download = `表情_${size}x${size}_${label}.${ext}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                    showToast(`✅ 已导出 ${size}x${size} ${label}`);
                }, mimeType, qualityParam);
            }

            // ----- 仓库 -----
            function getWarehouseItems() {
                try { return JSON.parse(localStorage.getItem('emoji_warehouse') || '[]'); } catch { return []; }
            }

            function saveWarehouseItems(items) {
                localStorage.setItem('emoji_warehouse', JSON.stringify(items));
            }

            function renderWarehouse() {
                const items = getWarehouseItems();
                whGrid.innerHTML = '';
                whCount.textContent = `共 ${items.length} 个`;

                if (items.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'wh-empty';
                    empty.textContent = '✨ 还没有表情，制作后存到这里吧';
                    whGrid.appendChild(empty);
                    return;
                }

                // 从新到旧
                const sorted = [...items].reverse();
                for (const item of sorted) {
                    const div = document.createElement('div');
                    div.className = 'wh-item';

                    // 复选框
                    const check = document.createElement('input');
                    check.type = 'checkbox';
                    check.className = 'wh-check';
                    check.dataset.index = items.indexOf(item);
                    div.appendChild(check);

                    // 图片或视频
                    if (item.type === 'gif') {
                        const video = document.createElement('video');
                        video.src = item.data;
                        video.muted = true;
                        video.loop = true;
                        video.autoplay = true;
                        video.playsInline = true;
                        video.onmouseenter = () => video.play();
                        video.onmouseleave = () => video.pause();
                        div.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = item.data;
                        img.alt = '表情';
                        img.loading = 'lazy';
                        div.appendChild(img);
                    }

                    // 下载按钮
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'wh-download';
                    downloadBtn.textContent = '⬇️';
                    downloadBtn.title = '下载到本地';
                    downloadBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const link = document.createElement('a');
                        link.href = item.data;
                        const ext = item.type === 'gif' ? 'gif' : 'png';
                        link.download = `表情_${item.size || 240}.${ext}`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        showToast('⬇️ 已下载');
                    });
                    div.appendChild(downloadBtn);

                    // 删除按钮（单个）
                    const del = document.createElement('button');
                    del.className = 'wh-del';
                    del.textContent = '×';
                    del.title = '删除';
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = items.indexOf(item);
                        if (idx !== -1) {
                            items.splice(idx, 1);
                            saveWarehouseItems(items);
                            renderWarehouse();
                            showToast('已删除');
                        }
                    });
                    div.appendChild(del);

                    // 点击预览
                    div.addEventListener('click', () => {
                        window.open(item.data, '_blank');
                    });

                    whGrid.appendChild(div);
                }
            }

            function getSelectedIndices() {
                const checks = whGrid.querySelectorAll('.wh-check');
                const indices = [];
                checks.forEach((ch, idx) => {
                    if (ch.checked) {
                        const index = parseInt(ch.dataset.index, 10);
                        if (!isNaN(index)) indices.push(index);
                    }
                });
                return indices;
            }

            function downloadSelected() {
                const items = getWarehouseItems();
                const indices = getSelectedIndices();
                if (indices.length === 0) { showToast('请先勾选要下载的表情'); return; }
                indices.forEach(idx => {
                    const item = items[idx];
                    if (item) {
                        const link = document.createElement('a');
                        link.href = item.data;
                        const ext = item.type === 'gif' ? 'gif' : 'png';
                        link.download = `表情_${item.size || 240}.${ext}`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                });
                showToast(`⬇️ 已下载 ${indices.length} 个文件`);
            }

            function deleteSelected() {
                const items = getWarehouseItems();
                const indices = getSelectedIndices();
                if (indices.length === 0) { showToast('请先勾选要删除的表情'); return; }
                if (!confirm(`确定删除选中的 ${indices.length} 个表情吗？`)) return;
                // 从后往前删
                const sortedIndices = indices.sort((a, b) => b - a);
                for (const idx of sortedIndices) {
                    items.splice(idx, 1);
                }
                saveWarehouseItems(items);
                renderWarehouse();
                showToast(`🗑️ 已删除 ${indices.length} 个`);
            }

            function clearWarehouse() {
                if (getWarehouseItems().length === 0) { showToast('仓库已是空的'); return; }
                if (confirm('确定清空全部表情吗？')) {
                    saveWarehouseItems([]);
                    renderWarehouse();
                    showToast('🗑️ 已清空仓库');
                }
            }

            // ----- 保存到仓库（从当前画布） -----
            function saveToWarehouse() {
                const { size } = getExportSettings();
                const offscreen = document.createElement('canvas');
                offscreen.width = size;
                offscreen.height = size;
                const offCtx = offscreen.getContext('2d');

                const srcSize = state.canvasSize;
                const scale = size / srcSize;

                const grad = offCtx.createRadialGradient(size / 2, size / 2, 10, size / 2, size / 2, size * 0.7);
                grad.addColorStop(0, '#fff5f7');
                grad.addColorStop(1, '#fce8ee');
                offCtx.fillStyle = grad;
                offCtx.fillRect(0, 0, size, size);

                if (state.image) {
                    const img = state.image;
                    const iw = img.width;
                    const ih = img.height;
                    const s = Math.min(size / iw, size / ih);
                    const dw = iw * s;
                    const dh = ih * s;
                    const dx = (size - dw) / 2;
                    const dy = (size - dh) / 2;
                    offCtx.drawImage(img, dx, dy, dw, dh);
                }

                for (const t of state.texts) {
                    const fs = Math.max(12, Math.round((t.fontSize || 32) * scale));
                    offCtx.save();
                    offCtx.textAlign = 'center';
                    offCtx.textBaseline = 'middle';
                    let font = '';
                    if (t.bold) font += 'bold ';
                    font += fs + 'px "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif';
                    offCtx.font = font;
                    const tx = t.x * scale;
                    const ty = t.y * scale;
                    if (t.stroke) {
                        offCtx.lineWidth = Math.max(1.5, fs / 14);
                        offCtx.strokeStyle = t.strokeColor || '#ffffff';
                        offCtx.lineJoin = 'round';
                        offCtx.lineCap = 'round';
                        offCtx.strokeText(t.text, tx, ty);
                    }
                    offCtx.fillStyle = t.color || '#d45a7a';
                    offCtx.fillText(t.text, tx, ty);
                    offCtx.restore();
                }

                offscreen.toBlob((blob) => {
                    if (!blob) { showToast('❌ 保存失败'); return; }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const items = getWarehouseItems();
                        items.push({
                            type: 'image',
                            data: e.target.result,
                            size: size,
                            time: Date.now(),
                        });
                        saveWarehouseItems(items);
                        renderWarehouse();
                        showToast('📦 已存入仓库');
                    };
                    reader.readAsDataURL(blob);
                }, 'image/png');
            }

            // ----- GIF 制作 -----
            function loadVideo(file) {
                if (!file) return;
                state.videoFile = file;
                if (state.videoURL) URL.revokeObjectURL(state.videoURL);
                state.videoURL = URL.createObjectURL(file);
                gifStatus.innerHTML = `📹 已加载: <span class="file-name">${file.name}</span>`;
                const video = document.createElement('video');
                video.src = state.videoURL;
                video.muted = true;
                video.preload = 'auto';
                video.onloadeddata = () => {
                    state.videoElement = video;
                    showToast('✅ 视频已加载');
                };
                video.onerror = () => showToast('❌ 视频加载失败');
                video.load();
            }

            function generateGIF() {
                if (!state.videoElement || !state.videoFile) {
                    showToast('请先上传视频');
                    return;
                }
                const video = state.videoElement;
                const size = parseInt(gifSizeSelect.value, 10);
                const maxFrames = 60;
                const interval = 0.08;
                const duration = Math.min(video.duration || 3, 3);
                const totalFrames = Math.min(Math.floor(duration / interval), maxFrames);
                if (totalFrames < 2) {
                    showToast('视频太短，请上传更长的视频');
                    return;
                }

                genGifBtn.disabled = true;
                genGifBtn.textContent = '⏳ 生成中...';

                const gif = new GIF({
                    workers: 2,
                    quality: 10,
                    width: size,
                    height: size,
                    workerURL: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js',
                });

                const offscreen = document.createElement('canvas');
                offscreen.width = size;
                offscreen.height = size;
                const offCtx = offscreen.getContext('2d');

                let frameCount = 0;
                let currentTime = 0;

                function addFrame() {
                    if (frameCount >= totalFrames || currentTime >= duration) {
                        gif.render();
                        return;
                    }
                    video.currentTime = currentTime;
                    video.addEventListener('seeked', function onSeek() {
                        video.removeEventListener('seeked', onSeek);
                        offCtx.clearRect(0, 0, size, size);
                        offCtx.fillStyle = '#fff5f7';
                        offCtx.fillRect(0, 0, size, size);

                        const vw = video.videoWidth || 640;
                        const vh = video.videoHeight || 480;
                        const scale = Math.min(size / vw, size / vh);
                        const dw = vw * scale;
                        const dh = vh * scale;
                        const dx = (size - dw) / 2;
                        const dy = (size - dh) / 2;
                        offCtx.drawImage(video, dx, dy, dw, dh);

                        // 简单水印
                        offCtx.save();
                        offCtx.fillStyle = 'rgba(255,255,255,0.4)';
                        offCtx.font = '12px sans-serif';
                        offCtx.textAlign = 'right';
                        offCtx.textBaseline = 'bottom';
                        offCtx.fillText('✨ 表情包', size - 8, size - 6);
                        offCtx.restore();

                        gif.addFrame(offscreen, { copy: true, delay: Math.round(interval * 1000) });
                        frameCount++;
                        currentTime += interval;
                        setTimeout(addFrame, 20);
                    });
                    setTimeout(() => {
                        if (frameCount < totalFrames) {
                            frameCount++;
                            currentTime += interval;
                            setTimeout(addFrame, 20);
                        }
                    }, 500);
                }

                gif.on('progress', (p) => {
                    genGifBtn.textContent = `⏳ ${Math.round(p * 100)}%`;
                });

                gif.on('finished', (blob) => {
                    genGifBtn.disabled = false;
                    genGifBtn.textContent = '⚡ 生成 GIF';
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `表情_${size}x${size}.gif`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                    showToast(`✅ GIF 已生成 ${size}x${size}`);

                    // 自动存入仓库
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const items = getWarehouseItems();
                        items.push({
                            type: 'gif',
                            data: e.target.result,
                            size: size,
                            time: Date.now(),
                        });
                        saveWarehouseItems(items);
                        renderWarehouse();
                    };
                    reader.readAsDataURL(blob);
                });

                // 开始
                video.currentTime = 0;
                if (video.readyState >= 3) {
                    setTimeout(addFrame, 200);
                } else {
                    video.addEventListener('loadeddata', function onLoad() {
                        video.removeEventListener('loadeddata', onLoad);
                        setTimeout(addFrame, 200);
                    });
                }

                setTimeout(() => {
                    if (genGifBtn.disabled) {
                        genGifBtn.disabled = false;
                        genGifBtn.textContent = '⚡ 生成 GIF';
                        showToast('⏱️ 生成超时，请重试');
                    }
                }, 60000);
            }

            // ----- 画布交互（拖拽） -----
            function setupCanvasInteraction() {
                function getCanvasCoords(e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = state.canvasSize / rect.width;
                    const scaleY = state.canvasSize / rect.height;
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if (clientX == null) return { x: 0, y: 0 };
                    return {
                        x: (clientX - rect.left) * scaleX,
                        y: (clientY - rect.top) * scaleY,
                    };
                }

                let mouseDown = false;
                let mouseX = 0,
                    mouseY = 0;

                function onPointerDown(e) {
                    e.preventDefault();
                    const pos = getCanvasCoords(e);
                    mouseX = pos.x;
                    mouseY = pos.y;
                    const hitId = hitTestText(mouseX, mouseY);
                    if (hitId !== null) {
                        selectText(hitId);
                        state.dragging = true;
                        state.dragTargetId = hitId;
                        const t = state.texts.find(t => t.id === hitId);
                        if (t) {
                            state.dragOffsetX = mouseX - t.x;
                            state.dragOffsetY = mouseY - t.y;
                        }
                        canvas.style.cursor = 'grabbing';
                    } else {
                        state.selectedId = null;
                        renderTextList();
                        drawScene();
                    }
                }

                function onPointerMove(e) {
                    e.preventDefault();
                    const pos = getCanvasCoords(e);
                    mouseX = pos.x;
                    mouseY = pos.y;
                    if (state.dragging && state.dragTargetId !== null) {
                        const t = state.texts.find(t => t.id === state.dragTargetId);
                        if (t) {
                            t.x = Math.max(10, Math.min(state.canvasSize - 10, mouseX - state.dragOffsetX));
                            t.y = Math.max(10, Math.min(state.canvasSize - 10, mouseY - state.dragOffsetY));
                            drawScene();
                        }
                    } else {
                        const hitId = hitTestText(mouseX, mouseY);
                        canvas.style.cursor = hitId !== null ? 'grab' : 'default';
                    }
                }

                function onPointerUp(e) {
                    if (state.dragging) {
                        state.dragging = false;
                        state.dragTargetId = null;
                        canvas.style.cursor = 'default';
                        drawScene();
                    }
                }

                canvas.addEventListener('mousedown', onPointerDown);
                canvas.addEventListener('mousemove', onPointerMove);
                canvas.addEventListener('mouseup', onPointerUp);
                canvas.addEventListener('mouseleave', onPointerUp);

                canvas.addEventListener('touchstart', (e) => { e.preventDefault();
                    onPointerDown(e); }, { passive: false });
                canvas.addEventListener('touchmove', (e) => { e.preventDefault();
                    onPointerMove(e); }, { passive: false });
                canvas.addEventListener('touchend', (e) => { e.preventDefault();
                    onPointerUp(e); }, { passive: false });
            }

            // ----- 功能切换 -----
            function switchTab(tabId) {
                tabBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tabId);
                });
                Object.keys(panels).forEach(key => {
                    panels[key].classList.toggle('active', key === tabId);
                });
            }

            // ----- 初始化 -----
            function init() {
                state.canvasSize = 600;
                canvas.width = 600;
                canvas.height = 600;

                // 上传图片
                const uploadInput = document.createElement('input');
                uploadInput.type = 'file';
                uploadInput.accept = 'image/*';
                uploadInput.id = 'imageUpload';
                uploadInput.style.display = 'none';
                document.body.appendChild(uploadInput);

                // 在预览区添加上传按钮（隐藏input，用触发）
                const uploadBtn = document.createElement('button');
                uploadBtn.textContent = '📤 上传图片';
                uploadBtn.className = 'primary-btn outline';
                uploadBtn.style.position = 'absolute';
                uploadBtn.style.bottom = '16px';
                uploadBtn.style.right = '16px';
                uploadBtn.style.zIndex = '10';
                uploadBtn.style.padding = '6px 16px';
                uploadBtn.style.fontSize = '13px';
                uploadBtn.style.borderRadius = '40px';
                uploadBtn.style.background = 'rgba(255,255,255,0.6)';
                uploadBtn.style.border = '1px solid rgba(255,180,195,0.3)';
                uploadBtn.style.backdropFilter = 'blur(4px)';
                uploadBtn.style.cursor = 'pointer';
                uploadBtn.onclick = () => uploadInput.click();
                wrapper.appendChild(uploadBtn);

                uploadInput.addEventListener('change', (e) => {
                    if (e.target.files && e.target.files[0]) {
                        loadImage(e.target.files[0]);
                    }
                });

                // 清除图片按钮
                const clearBtn = document.createElement('button');
                clearBtn.textContent = '✕ 清除';
                clearBtn.style.position = 'absolute';
                clearBtn.style.bottom = '16px';
                clearBtn.style.right = '130px';
                clearBtn.style.zIndex = '10';
                clearBtn.style.padding = '6px 16px';
                clearBtn.style.fontSize = '13px';
                clearBtn.style.borderRadius = '40px';
                clearBtn.style.background = 'rgba(255,200,210,0.3)';
                clearBtn.style.border = '1px solid rgba(255,180,195,0.2)';
                clearBtn.style.backdropFilter = 'blur(4px)';
                clearBtn.style.cursor = 'pointer';
                clearBtn.onclick = clearImage;
                wrapper.appendChild(clearBtn);

                // 文字添加
                addTextBtn.addEventListener('click', () => addText(textInput.value));
                textInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault();
                        addText(textInput.value); }
                });

                // 样式变更
                textColor.addEventListener('input', updateSelectedStyle);
                strokeColor.addEventListener('input', updateSelectedStyle);
                boldCheck.addEventListener('change', updateSelectedStyle);
                strokeCheck.addEventListener('change', updateSelectedStyle);
                fontSizeSlider.addEventListener('input', () => {
                    fontSizeLabel.textContent = fontSizeSlider.value;
                    updateSelectedStyle();
                });

                // 导出设置
                sizeGroup.querySelectorAll('.opt-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        sizeGroup.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
                qualityGroup.querySelectorAll('.opt-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        qualityGroup.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });

                exportBtn.addEventListener('click', exportImage);
                saveToWarehouseBtn.addEventListener('click', saveToWarehouse);

                // GIF
                videoUpload.addEventListener('change', (e) => {
                    if (e.target.files && e.target.files[0]) loadVideo(e.target.files[0]);
                });
                genGifBtn.addEventListener('click', generateGIF);

                // 仓库
                clearWarehouseBtn.addEventListener('click', clearWarehouse);
                downloadSelectedBtn.addEventListener('click', downloadSelected);
                deleteSelectedBtn.addEventListener('click', deleteSelected);

                // 功能切换
                tabBtns.forEach(btn => {
                    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
                });

                // 默认显示贴文字
                switchTab('text');

                // 画布交互
                setupCanvasInteraction();

                // 拖拽上传到预览区
                wrapper.addEventListener('dragover', (e) => { e.preventDefault();
                    wrapper.style.borderColor = '#ff8da1'; });
                wrapper.addEventListener('dragleave', () => { wrapper.style.borderColor = 'rgba(255,150,180,0.30)'; });
                wrapper.addEventListener('drop', (e) => {
                    e.preventDefault();
                    wrapper.style.borderColor = 'rgba(255,150,180,0.30)';
                    const files = e.dataTransfer.files;
                    if (files && files.length > 0) {
                        const file = files[0];
                        if (file.type.startsWith('image/')) {
                            loadImage(file);
                            uploadInput.files = files;
                        } else {
                            showToast('请拖入图片文件');
                        }
                    }
                });

                // 加载仓库
                renderWarehouse();

                // 初始绘制
                drawScene();

                // 示例文字
                setTimeout(() => {
                    if (state.texts.length === 0) {
                        addText('✨ 你好呀');
                    }
                }, 300);

                console.log('🌸 表情包生成器已启动 | 制作人 KIKI');
            }

            init();

        })();
    </script>

</body>
