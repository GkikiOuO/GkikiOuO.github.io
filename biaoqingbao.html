            // ================================================================
            //  GIF 制作
            // ================================================================
            function loadVideo(file) {
                if (!file) return;
                state.videoFile = file;
                if (state.videoURL) URL.revokeObjectURL(state.videoURL);
                state.videoURL = URL.createObjectURL(file);
                gifStatus.innerHTML = `📹 已加载: <span class="file-name">${file.name}</span>`;
                const video = document.createElement('video');
                video.src = state.videoURL;
                video.muted = true;
                video.preload = 'auto';
                video.onloadeddata = () => {
                    state.videoElement = video;
                    showToast('✅ 视频已加载');
                };
                video.onerror = () => showToast('❌ 视频加载失败');
                video.load();
            }

            function generateGIF() {
                if (!state.videoElement || !state.videoFile) {
                    showToast('请先上传视频');
                    return;
                }
                const video = state.videoElement;
                const size = parseInt(gifSizeSelect.value, 10);
                const maxFrames = 60;
                const interval = 0.08;
                const duration = Math.min(video.duration || 3, 3);
                const totalFrames = Math.min(Math.floor(duration / interval), maxFrames);
                if (totalFrames < 2) {
                    showToast('视频太短，请上传更长的视频');
                    return;
                }

                genGifBtn.disabled = true;
                genGifBtn.textContent = '⏳ 生成中...';

                const gif = new GIF({
                    workers: 2,
                    quality: 10,
                    width: size,
                    height: size,
                    workerURL: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js',
                });

                const offscreen = document.createElement('canvas');
                offscreen.width = size;
                offscreen.height = size;
                const offCtx = offscreen.getContext('2d');

                let frameCount = 0;
                let currentTime = 0;

                function addFrame() {
                    if (frameCount >= totalFrames || currentTime >= duration) {
                        gif.render();
                        return;
                    }
                    video.currentTime = currentTime;
                    video.addEventListener('seeked', function onSeek() {
                        video.removeEventListener('seeked', onSeek);
                        offCtx.clearRect(0, 0, size, size);
                        // 白色背景（GIF 推荐白色背景）
                        offCtx.fillStyle = '#ffffff';
                        offCtx.fillRect(0, 0, size, size);

                        const vw = video.videoWidth || 640;
                        const vh = video.videoHeight || 480;
                        const scale = Math.min(size / vw, size / vh);
                        const dw = vw * scale;
                        const dh = vh * scale;
                        const dx = (size - dw) / 2;
                        const dy = (size - dh) / 2;
                        offCtx.drawImage(video, dx, dy, dw, dh);

                        // 水印
                        offCtx.save();
                        offCtx.fillStyle = 'rgba(200,200,200,0.3)';
                        offCtx.font = '12px sans-serif';
                        offCtx.textAlign = 'right';
                        offCtx.textBaseline = 'bottom';
                        offCtx.fillText('✨ 表情包', size - 8, size - 6);
                        offCtx.restore();

                        gif.addFrame(offscreen, { copy: true, delay: Math.round(interval * 1000) });
                        frameCount++;
                        currentTime += interval;
                        setTimeout(addFrame, 20);
                    });
                    setTimeout(() => {
                        if (frameCount < totalFrames) {
                            frameCount++;
                            currentTime += interval;
                            setTimeout(addFrame, 20);
                        }
                    }, 500);
                }

                gif.on('progress', (p) => {
                    genGifBtn.textContent = `⏳ ${Math.round(p * 100)}%`;
                });

                gif.on('finished', (blob) => {
                    genGifBtn.disabled = false;
                    genGifBtn.textContent = '⚡ 生成 GIF';
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `表情_${size}x${size}.gif`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                    showToast(`✅ GIF 已生成 ${size}x${size}`);

                    // 自动存入仓库
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const items = getWarehouseItems();
                        items.push({
                            type: 'gif',
                            data: e.target.result,
                            size: size,
                            time: Date.now(),
                        });
                        saveWarehouseItems(items);
                        renderWarehouse();
                    };
                    reader.readAsDataURL(blob);
                });

                // 开始
                video.currentTime = 0;
                if (video.readyState >= 3) {
                    setTimeout(addFrame, 200);
                } else {
                    video.addEventListener('loadeddata', function onLoad() {
                        video.removeEventListener('loadeddata', onLoad);
                        setTimeout(addFrame, 200);
                    });
                }

                setTimeout(() => {
                    if (genGifBtn.disabled) {
                        genGifBtn.disabled = false;
                        genGifBtn.textContent = '⚡ 生成 GIF';
                        showToast('⏱️ 生成超时，请重试');
                    }
                }, 60000);
            }

            // ================================================================
            //  画布交互（拖拽）
            // ================================================================
            function setupCanvasInteraction() {
                function getCanvasCoords(e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = state.canvasSize / rect.width;
                    const scaleY = state.canvasSize / rect.height;
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if (clientX == null) return { x: 0, y: 0 };
                    return {
                        x: (clientX - rect.left) * scaleX,
                        y: (clientY - rect.top) * scaleY,
                    };
                }

                function onPointerDown(e) {
                    e.preventDefault();
                    const pos = getCanvasCoords(e);
                    const hitId = hitTestText(pos.x, pos.y);
                    if (hitId !== null) {
                        selectText(hitId);
                        state.dragging = true;
                        state.dragTargetId = hitId;
                        const t = state.texts.find(t => t.id === hitId);
                        if (t) {
                            state.dragOffsetX = pos.x - t.x;
                            state.dragOffsetY = pos.y - t.y;
                        }
                        canvas.style.cursor = 'grabbing';
                    } else {
                        state.selectedId = null;
                        renderTextList();
                        drawScene();
                    }
                }

                function onPointerMove(e) {
                    e.preventDefault();
                    const pos = getCanvasCoords(e);
                    if (state.dragging && state.dragTargetId !== null) {
                        const t = state.texts.find(t => t.id === state.dragTargetId);
                        if (t) {
                            t.x = Math.max(10, Math.min(state.canvasSize - 10, pos.x - state.dragOffsetX));
                            t.y = Math.max(10, Math.min(state.canvasSize - 10, pos.y - state.dragOffsetY));
                            drawScene();
                        }
                    } else {
                        const hitId = hitTestText(pos.x, pos.y);
                        canvas.style.cursor = hitId !== null ? 'grab' : 'default';
                    }
                }

                function onPointerUp(e) {
                    if (state.dragging) {
                        state.dragging = false;
                        state.dragTargetId = null;
                        canvas.style.cursor = 'default';
                        drawScene();
                    }
                }

                canvas.addEventListener('mousedown', onPointerDown);
                canvas.addEventListener('mousemove', onPointerMove);
                canvas.addEventListener('mouseup', onPointerUp);
                canvas.addEventListener('mouseleave', onPointerUp);

                canvas.addEventListener('touchstart', (e) => { e.preventDefault();
                    onPointerDown(e); }, { passive: false });
                canvas.addEventListener('touchmove', (e) => { e.preventDefault();
                    onPointerMove(e); }, { passive: false });
                canvas.addEventListener('touchend', (e) => { e.preventDefault();
                    onPointerUp(e); }, { passive: false });
            }

            // ================================================================
            //  功能切换
            // ================================================================
            function switchTab(tabId) {
                tabBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tabId);
                });
                Object.keys(panels).forEach(key => {
                    panels[key].classList.toggle('active', key === tabId);
                });
            }

            // ================================================================
            //  初始化
            // ================================================================
            function init() {
                state.canvasSize = 600;
                canvas.width = 600;
                canvas.height = 600;

                // 上传图片
                uploadImageBtn.addEventListener('click', () => imageUpload.click());
                imageUpload.addEventListener('change', (e) => {
                    if (e.target.files && e.target.files[0]) {
                        loadImage(e.target.files[0]);
                    }
                });

                clearImageBtn.addEventListener('click', clearImage);

                // 文字
                addTextBtn.addEventListener('click', () => addText(textInput.value));
                textInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault();
                        addText(textInput.value); }
                });

                textColor.addEventListener('input', updateSelectedStyle);
                strokeColor.addEventListener('input', updateSelectedStyle);
                boldCheck.addEventListener('change', updateSelectedStyle);
                strokeCheck.addEventListener('change', updateSelectedStyle);
                fontSizeSlider.addEventListener('input', () => {
                    fontSizeLabel.textContent = fontSizeSlider.value;
                    updateSelectedStyle();
                });

                // 导出设置 - 尺寸
                sizeGroup.querySelectorAll('.opt-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        sizeGroup.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        updateSizeHint();
                    });
                });

                // 导出设置 - 背景
                bgGroup.querySelectorAll('.opt-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        bgGroup.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });

                // 导出设置 - 质量
                qualityGroup.querySelectorAll('.opt-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        qualityGroup.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });

                exportBtn.addEventListener('click', exportImage);
                previewBtn.addEventListener('click', previewExport);
                saveToWarehouseBtn.addEventListener('click', saveToWarehouse);

                // 预览模态框关闭
                previewModalClose.addEventListener('click', closePreviewModal);
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closePreviewModal();
                });

                // GIF
                videoUpload.addEventListener('change', (e) => {
                    if (e.target.files && e.target.files[0]) loadVideo(e.target.files[0]);
                });
                genGifBtn.addEventListener('click', generateGIF);

                // 仓库
                clearWarehouseBtn.addEventListener('click', clearWarehouse);
                downloadSelectedBtn.addEventListener('click', downloadSelected);
                deleteSelectedBtn.addEventListener('click', deleteSelected);

                // 功能切换
                tabBtns.forEach(btn => {
                    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
                });

                // 默认显示贴文字
                switchTab('text');

                // 画布交互
                setupCanvasInteraction();

                // 拖拽上传
                wrapper.addEventListener('dragover', (e) => { e.preventDefault();
                    wrapper.style.borderColor = '#ff8da1'; });
                wrapper.addEventListener('dragleave', () => { wrapper.style.borderColor = 'rgba(255,150,180,0.30)'; });
                wrapper.addEventListener('drop', (e) => {
                    e.preventDefault();
                    wrapper.style.borderColor = 'rgba(255,150,180,0.30)';
                    const files = e.dataTransfer.files;
                    if (files && files.length > 0) {
                        const file = files[0];
                        if (file.type.startsWith('image/')) {
                            loadImage(file);
                            imageUpload.files = files;
                        } else {
                            showToast('请拖入图片文件');
                        }
                    }
                });

                // 更新尺寸提示
                updateSizeHint();

                // 加载仓库
                renderWarehouse();

                // 初始绘制
                drawScene();

                // 示例文字
                setTimeout(() => {
                    if (state.texts.length === 0) {
                        addText('✨ 你好呀');
                    }
                }, 300);

                console.log('🌸 表情包生成器已启动 | 制作人 KIKI');
            }

            function updateSizeHint() {
                const activeSize = sizeGroup.querySelector('.opt-btn.active');
                if (activeSize) {
                    const size = parseInt(activeSize.dataset.value, 10);
                    let hint = `📏 微信推荐 <strong>240×240</strong> · 当前 ${size}×${size}`;
                    if (size === 240) {
                        hint = '📏 ✅ 推荐尺寸 <strong>240×240</strong> · 微信表情最佳显示';
                    } else if (size <= 320) {
                        hint = `📏 ✅ ${size}×${size} · 微信表情兼容良好`;
                    } else if (size <= 480) {
                        hint = `📏 ⚠️ ${size}×${size} · 可能略大，建议 ≤320`;
                    } else {
                        hint = `📏 ⚠️ ${size}×${size} · 尺寸偏大，建议用 240 或 320`;
                    }
                    sizeHint.innerHTML = hint;
                }
            }

            init();

        })();
    </script>

</body>
</html>
