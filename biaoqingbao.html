<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>表情包生成器</title>
    <!-- gif.js 用于 GIF 生成 -->
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.min.js">
    </script>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffe8ee 0%, #ffd9e2 50%, #ffc8d4 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            max-width: 1360px;
            width: 100%;
            background: rgba(255, 245, 247, 0.60);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px;
            padding: 24px 28px 28px;
            box-shadow: 0 20px 60px rgba(255, 150, 180, 0.20);
            border: 1px solid rgba(255, 255, 255, 0.50);
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-left .icon {
            font-size: 32px;
        }
        .header-left h1 {
            font-size: 26px;
            font-weight: 700;
            color: #6b3a4a;
            background: linear-gradient(135deg, #d45a7a, #b84a6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== 右上角 — 图片 + 制作人信息 ===== */
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.45);
            padding: 4px 16px 4px 8px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.50);
            box-shadow: 0 2px 12px rgba(255, 150, 180, 0.08);
        }

        /* ----- 右上角图片（可替换） ----- */
        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.70);
            box-shadow: 0 2px 8px rgba(255, 130, 160, 0.15);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: #ffd9e2; /* 占位背景色 */
            flex-shrink: 0;
        }
        .header-avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(255, 130, 160, 0.30);
        }

        /* 头像加载失败时的备用样式 (由JS控制) */
        .header-avatar-fallback {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffb6c1, #ff8da1);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(255, 130, 160, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.70);
        }

        .header-right .maker-text {
            font-size: 15px;
            color: #7a4e5e;
            font-weight: 500;
            white-space: nowrap;
        }
        .header-right .maker-text span {
            color: #b45374;
            font-weight: 600;
        }

        /* ===== 主布局 ===== */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 20px;
            margin-bottom: 18px;
        }

        /* ===== 预览区 ===== */
        .preview-area {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 28px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.60);
            backdrop-filter: blur(4px);
            position: relative;
        }

        .preview-area .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 10px 4px;
            font-size: 14px;
            color: #7a4e5e;
            font-weight: 500;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: rgba(255, 240, 244, 0.30);
            border-radius: 20px;
            overflow: hidden;
            border: 2px dashed rgba(255, 150, 180, 0.30);
        }

        .canvas-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 18px;
            background: #fff9fa;
            cursor: default;
        }

        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #b58a9a;
            font-size: 16px;
            pointer-events: none;
            text-align: center;
            opacity: 0.7;
        }
        .placeholder-text .big {
            font-size: 42px;
            display: block;
        }

        /* 预览区浮动按钮 */
        .preview-actions {
            position: absolute;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 8px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .preview-actions .float-btn {
            padding: 5px 14px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            font-size: 12px;
            color: #6b3a4a;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(255, 130, 160, 0.08);
        }
        .preview-actions .float-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }
        .preview-actions .float-btn.danger {
            color: #b45374;
        }

        /* ===== 文字侧边栏 ===== */
        .text-sidebar {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 28px;
            padding: 14px 14px;
            border: 1px solid rgba(255, 255, 255, 0.60);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 480px;
        }

        .text-sidebar .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: #6b3a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .text-sidebar .sidebar-title .badge {
            background: rgba(255, 255, 255, 0.5);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #8a5a6a;
        }
        .text-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }
        .text-list::-webkit-scrollbar {
            width: 4px;
        }
        .text-list::-webkit-scrollbar-thumb {
            background: #ffb0c0;
            border-radius: 8px;
        }

        .text-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 180, 195, 0.3);
            border-radius: 30px;
            padding: 3px 10px 3px 14px;
            font-size: 13px;
            color: #4a2a3a;
            cursor: pointer;
            transition: all 0.15s;
            min-height: 32px;
        }
        .text-tag:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: #ff8da1;
        }
        .text-tag.active-tag {
            background: rgba(255, 140, 170, 0.20);
            border-color: #ff8da1;
            box-shadow: 0 0 0 2px rgba(255, 140, 170, 0.15);
        }
        .text-tag .tag-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .text-tag .tag-del {
            font-size: 16px;
            color: #b58a9a;
            cursor: pointer;
            padding: 0 2px;
            transition: color 0.2s;
        }
        .text-tag .tag-del:hover {
            color: #d45a7a;
        }
        .text-sidebar .hint {
            font-size: 11px;
            color: #b58a9a;
            text-align: center;
            padding-top: 2px;
        }

        /* ===== 功能切换 ===== */
        .function-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 180, 195, 0.25);
        }

        .function-tabs .tab-btn {
            padding: 7px 22px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.35);
            color: #6b3a4a;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            backdrop-filter: blur(4px);
        }

        .function-tabs .tab-btn:hover {
            background: rgba(255, 255, 255, 0.6);
        }
        .function-tabs .tab-btn.active {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 140, 170, 0.3);
            box-shadow: 0 2px 12px rgba(255, 130, 160, 0.08);
            color: #b45374;
        }

        /* ===== 面板容器 ===== */
        .panel-container {
            background: rgba(255, 255, 255, 0.30);
            border-radius: 28px;
            padding: 18px 22px 22px;
            border: 1px solid rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(4px);
            min-height: 180px;
            margin-bottom: 14px;
            transition: all 0.2s;
        }

        .panel-content {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .panel-content.active {
            display: block;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0.4;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-content .panel-title {
            font-size: 15px;
            font-weight: 600;
            color: #6b3a4a;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== 贴文字面板 ===== */
        .text-input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .text-input-row input[type="text"] {
            flex: 1;
            padding: 7px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 180, 195, 0.4);
            background: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            color: #4a2a3a;
            outline: none;
            transition: all 0.2s;
            min-width: 120px;
        }
        .text-input-row input[type="text"]:focus {
            border-color: #ff8da1;
            box-shadow: 0 0 0 3px rgba(255, 140, 170, 0.15);
            background: rgba(255, 255, 255, 0.8);
        }
        .text-input-row .add-text-btn {
            padding: 7px 22px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #ff8da1, #f5728a);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .text-input-row .add-text-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 16px rgba(255, 100, 130, 0.3);
        }

        .style-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            align-items: center;
            margin-bottom: 4px;
        }
        .style-row .color-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #6b3a4a;
        }
        .style-row .color-group input[type="color"] {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            padding: 0;
            cursor: pointer;
            background: none;
        }
        .style-row .color-group input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .style-row .color-group input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }
        .style-row .toggle-group {
            display: flex;
            gap: 4px;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            padding: 3px 8px;
            border-radius: 30px;
            border: 1px solid rgba(255, 200, 210, 0.2);
        }
        .style-row .toggle-group label {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 12px;
            color: #6b3a4a;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 20px;
        }
        .style-row .toggle-group input[type="checkbox"] {
            accent-color: #ff8da1;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        .style-row .font-size-control {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #6b3a4a;
        }
        .style-row .font-size-control input[type="range"] {
            width: 100px;
            accent-color: #ff8da1;
            cursor: pointer;
        }
        .style-row .font-size-control .size-label {
            min-width: 28px;
            text-align: center;
            font-weight: 500;
            color: #b45374;
        }
        .panel-hint {
            font-size: 12px;
            color: #b58a9a;
            margin-top: 4px;
        }

        /* ===== 导出面板 ===== */
        .export-options {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 28px;
            margin-bottom: 14px;
        }
        .export-options .opt-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .export-options .opt-group .label {
            font-size: 13px;
            color: #6b3a4a;
            font-weight: 500;
        }
        .export-options .opt-group .btn-group {
            display: flex;
            gap: 3px;
            background: rgba(255, 255, 255, 0.3);
            padding: 3px;
            border-radius: 30px;
            border: 1px solid rgba(255, 200, 210, 0.2);
        }
        .export-options .opt-group .btn-group .opt-btn {
            padding: 4px 14px;
            border: none;
            border-radius: 30px;
            background: transparent;
            font-size: 12px;
            font-weight: 500;
            color: #6b3a4a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .export-options .opt-group .btn-group .opt-btn.active {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 2px 8px rgba(255, 130, 160, 0.15);
            color: #b45374;
        }
        .export-options .opt-group .btn-group .opt-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.3);
        }

        .export-options .opt-group select {
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 180, 195, 0.3);
            background: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            color: #4a2a3a;
            outline: none;
            cursor: pointer;
        }

        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .action-row .primary-btn {
            padding: 9px 24px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #ff8da1, #f5728a);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(255, 100, 130, 0.20);
        }
        .action-row .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 100, 130, 0.30);
        }
        .action-row .primary-btn.outline {
            background: rgba(255, 255, 255, 0.5);
            color: #6b3a4a;
            box-shadow: none;
            border: 1px solid rgba(255, 180, 195, 0.4);
        }
        .action-row .primary-btn.outline:hover {
            background: rgba(255, 255, 255, 0.8);
        }
        .action-row .primary-btn.preview-btn {
            background: linear-gradient(135deg, #a8d8ea, #7ac0d4);
            box-shadow: 0 4px 14px rgba(100, 180, 200, 0.20);
        }
        .action-row .primary-btn.preview-btn:hover {
            box-shadow: 0 8px 24px rgba(100, 180, 200, 0.30);
        }

        .size-hint {
            font-size: 12px;
            color: #b58a9a;
            margin-top: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            display: inline-block;
        }
        .size-hint strong {
            color: #b45374;
        }

        /* ===== GIF 面板 ===== */
        .gif-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
        }
        .gif-controls .file-input-wrap {
            position: relative;
            display: inline-block;
        }
        .gif-controls .file-input-wrap input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            top: 0;
            left: 0;
        }
        .gif-controls .file-input-wrap .fake-btn {
            padding: 6px 20px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 180, 195, 0.3);
            font-size: 13px;
            color: #6b3a4a;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .gif-controls .file-input-wrap .fake-btn:hover {
            background: rgba(255, 255, 255, 0.85);
            border-color: #ff8da1;
        }
        .gif-controls .gif-status {
            font-size: 13px;
            color: #7a4e5e;
            flex: 1;
            min-width: 100px;
        }
        .gif-controls .gif-status .file-name {
            color: #b45374;
            font-weight: 500;
        }
        .gif-controls .gif-size-select {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .gif-controls .gif-size-select .label {
            font-size: 13px;
            color: #6b3a4a;
        }
        .gif-controls .gif-size-select select {
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 180, 195, 0.3);
            background: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            color: #4a2a3a;
            outline: none;
            cursor: pointer;
        }
        .gif-controls .gif-gen-btn {
            padding: 6px 26px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #a8d8ea, #7ac0d4);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(100, 180, 200, 0.20);
        }
        .gif-controls .gif-gen-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(100, 180, 200, 0.30);
        }
        .gif-controls .gif-gen-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 仓库面板 ===== */
        .warehouse-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
            align-items: center;
        }
        .warehouse-toolbar .wh-info {
            font-size: 13px;
            color: #7a4e5e;
            flex: 1;
        }
        .warehouse-toolbar .wh-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .warehouse-toolbar .wh-actions button {
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 180, 195, 0.3);
            background: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            color: #6b3a4a;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .warehouse-toolbar .wh-actions button:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: #ff8da1;
        }
        .warehouse-toolbar .wh-actions button.danger {
            color: #d45a7a;
            border-color: #f5b0b0;
        }
        .warehouse-toolbar .wh-actions button.danger:hover {
            background: rgba(255, 100, 130, 0.15);
        }

        .wh-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
            gap: 14px;
            max-height: 260px;
            overflow-y: auto;
            padding: 2px 2px 6px;
        }
        .wh-grid::-webkit-scrollbar {
            width: 4px;
        }
        .wh-grid::-webkit-scrollbar-thumb {
            background: #ffb0c0;
            border-radius: 8px;
        }

        .wh-item {
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            aspect-ratio: 1/1;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(255, 130, 160, 0.06);
            cursor: pointer;
        }
        .wh-item:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(255, 130, 160, 0.12);
        }
        .wh-item img,
        .wh-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .wh-item .wh-check {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 20px;
            height: 20px;
            accent-color: #ff8da1;
            cursor: pointer;
            z-index: 2;
            opacity: 0.8;
        }
        .wh-item .wh-del {
            position: absolute;
            top: 3px;
            right: 3px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 13px;
            line-height: 20px;
            text-align: center;
            color: #b45374;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 0;
            z-index: 2;
        }
        .wh-item:hover .wh-del {
            opacity: 1;
        }
        .wh-item .wh-del:hover {
            background: rgba(255, 200, 210, 0.8);
        }
        .wh-item .wh-download {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 13px;
            line-height: 22px;
            text-align: center;
            color: #6b3a4a;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 0;
            z-index: 2;
        }
        .wh-item:hover .wh-download {
            opacity: 1;
        }
        .wh-item .wh-download:hover {
            background: rgba(255, 255, 255, 0.9);
        }
        .wh-item .wh-size-badge {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 2;
        }
        .wh-item:hover .wh-size-badge {
            opacity: 1;
        }

        .wh-empty {
            color: #b58a9a;
            font-size: 14px;
            text-align: center;
            padding: 36px 0;
            grid-column: 1 / -1;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(60, 30, 40, 0.80);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 999;
            border: 1px solid rgba(255, 255, 255, 0.10);
            max-width: 90vw;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 预览模态框 ===== */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .preview-modal.active {
            display: flex;
        }
        .preview-modal .modal-content {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            max-width: 90vmin;
            max-height: 90vh;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .preview-modal .modal-content img,
        .preview-modal .modal-content video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 16px;
            display: block;
            background: #fff9fa;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }
        .preview-modal .modal-close {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            font-size: 20px;
            color: #6b3a4a;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-modal .modal-close:hover {
            transform: scale(1.08);
        }
        .preview-modal .modal-hint {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 14px;
            margin-top: 12px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        .preview-modal .modal-hint span {
            color: #ffb8c8;
            font-weight: 500;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .text-sidebar {
                max-height: 180px;
            }
            .app-container {
                padding: 16px;
            }
        }
        @media (max-width: 600px) {
            .app-container {
                padding: 10px;
                border-radius: 28px;
            }
            .header-left h1 {
                font-size: 20px;
            }
            .header-right {
                padding: 4px 12px 4px 6px;
                gap: 8px;
            }
            .header-avatar {
                width: 32px;
                height: 32px;
            }
            .header-avatar-fallback {
                width: 32px;
                height: 32px;
                font-size: 18px;
            }
            .header-right .maker-text {
                font-size: 13px;
            }
            .function-tabs .tab-btn {
                padding: 5px 14px;
                font-size: 12px;
            }
            .panel-container {

            }
            .style-row {

            }
            .style-row .font-size-control input[type="range"] {

            }

            }
            .action-row .primary-btn {

            }
            .wh-grid {
                grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
                gap: 10px;
            }
            .preview-actions {

                right: 12px;

            .preview-actions .float-btn {

                font-size: 13px;
            }
            .size-hint {
                font-size: 11px;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== 预览模态框 ===== -->
    <div class="preview-modal" id="previewModal">
        <div class="modal-content">
            <button class="modal-close" id="previewModalClose">✕</button>
            <img id="previewImage" src="" alt="预览表情" style="display:none;" />
            <video id="previewVideo" src="" muted loop autoplay playsinline style="display:none;"></video>
            <div class="modal-hint">📱 长按图片选择 <span>「保存到相册」</span> 或 <span>「添加到表情」</span></div>
        </div>
    </div>

    <!-- ===== 主容器 ===== -->
    <div class="app-container">

        <!-- ===== 头部 ===== -->
        <header class="header">
            <div class="header-left">
                <span class="icon">🌸</span>
                <h1>表情包生成器</h1>
            </div>

            <!-- ===== 右上角：图片 + 制作人信息 ===== -->
            <div class="header-right">
                <!-- ★★★ 右上角图片 — 替换 src 即可更换为自己的图片 ★★★ -->
                <img
                class="header-avatar"
                id="headerAvatar"
                src="https://api.dicebear.com/7.x/avataaars/svg?seed=KIKI&backgroundColor=ffd9e2"
                alt="头像"
                referrerpolicy="no-referrer"
                crossorigin="anonymous"
                onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex';"
                />
                <!-- 图片加载失败时的备用图标 -->
                <span class="header-avatar-fallback" id="avatarFallback">🌸</span>

                <span class="maker-text">✦ 制作人：<span>KIKI</span></span>
            </div>
        </header>

        <!-- ===== 主布局 ===== -->
        <div class="main-layout">

            <!-- ====== 预览区 ====== -->
            <div class="preview-area">
                <div class="label-row">
                    <span>🖼️ 预览区</span>
                    <span class="badge">点击文字选中 · 拖拽移动</span>
                </div>
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="mainCanvas" width="600" height="600"></canvas>
                    <div class="placeholder-text" id="placeholderText">
                        <span class="big">📷</span>
                        上传图片或添加文字
                    </div>
                    <!-- 浮动按钮 -->
                    <div class="preview-actions">
                        <button class="float-btn" id="uploadImageBtn">📤 上传图片</button>
                        <button class="float-btn danger" id="clearImageBtn">✕ 清除</button>

                </div>
            </div>

            <!-- ====== 文字侧边栏 ====== -->
            <div class="text-sidebar">
                <div class="sidebar-title">
                    <span>📝 文字列表</span>
                    <span class="badge" id="textCount">0</span>
                </div>
                <div class="text-list" id="textList"></div>
                <div class="hint">点击文字选中 · 拖拽预览区移动</div>
            </div>
        </div>

        <!-- ===== 功能切换 ===== -->
        <div class="function-tabs" id="functionTabs">
            <button class="tab-btn active" data-tab="text">✏️ 贴文字</button>
            <button class="tab-btn" data-tab="export">📐 导出设置</button>
            <button class="tab-btn" data-tab="gif">🎬 GIF制作</button>
            <button class="tab-btn" data-tab="warehouse">📦 仓库</button>
        </div>

        <!-- ===== 功能面板 ===== -->
        <div class="panel-container">

            <!-- ====== 贴文字面板 ====== -->
            <div class="panel-content active" id="panel-text">
                <div class="panel-title">✏️ 贴文字</div>
                <div class="text-input-row">
                    <input type="text" id="textInput" placeholder="输入文字，按 Enter 添加" maxlength="30" />
                    <button class="add-text-btn" id="addTextBtn">添加</button>
                </div>
                <div class="style-row">
                    <div class="color-group">
                        <span>颜色</span>
                        <input type="color" id="textColor" value="#d45a7a" />
                    </div>
                    <div class="color-group">
                        <span>描边</span>
                        <input type="color" id="strokeColor" value="#ffffff" />
                    </div>
                    <div class="toggle-group">
                        <label><input type="checkbox" id="boldCheck" /> 粗体</label>
                        <label><input type="checkbox" id="strokeCheck" /> 描边</label>
                    </div>
                    <div class="font-size-control">
                        <span>字号</span>
                        <input type="range" id="fontSizeSlider" min="16" max="80" value="32" step="1" />
                        <span class="size-label" id="fontSizeLabel">32</span>
                    </div>
                </div>
                <div class="panel-hint">💡 选中文字后调整样式，拖拽预览区文字移动位置</div>
            </div>

            <!-- ====== 导出设置面板 ====== -->
            <div class="panel-content" id="panel-export">
                <div class="panel-title">📐 导出设置</div>
                <div class="export-options">
                    <div class="opt-group">
                        <span class="label">尺寸</span>
                        <div class="btn-group" id="sizeGroup">
                            <button class="opt-btn active" data-value="240">240</button>
                            <button class="opt-btn" data-value="320">320</button>
                            <button class="opt-btn" data-value="480">480</button>
                            <button class="opt-btn" data-value="640">640</button>
                        </div>
                    </div>
                    <div class="opt-group">
                        <span class="label">背景</span>
                        <div class="btn-group" id="bgGroup">
                            <button class="opt-btn active" data-value="transparent">透明</button>
                            <button class="opt-btn" data-value="white">白色</button>
                            <button class="opt-btn" data-value="pink">粉色</button>
                        </div>
                    </div>
                    <div class="opt-group">
                        <span class="label">质量</span>
                        <div class="btn-group" id="qualityGroup">
                            <button class="opt-btn active" data-value="lossless">无损</button>
                            <button class="opt-btn" data-value="compressed">压缩</button>
                            <button class="opt-btn" data-value="low">渣图</button>
                        </div>
                    </div>
                </div>
                <div class="action-row">
                    <button class="primary-btn" id="exportBtn">💾 下载</button>
                    <button class="primary-btn preview-btn" id="previewBtn">👁️ 预览保存</button>
                    <button class="primary-btn outline" id="saveToWarehouseBtn">📦 存到仓库</button>
                </div>
                <div class="size-hint" id="sizeHint">
                    📏 微信推荐 <strong>240×240</strong> · 静态图 &lt;500KB · GIF &lt;1MB
                </div>
            </div>

            <!-- ====== GIF 制作面板 ====== -->
            <div class="panel-content" id="panel-gif">
                <div class="panel-title">🎬 GIF 制作</div>
                <div class="gif-controls">
                    <div class="file-input-wrap">
                        <input type="file" id="videoUpload" accept="video/*" />
                        <div class="fake-btn">📹 上传视频</div>
                    </div>
                    <div class="gif-status" id="gifStatus">未选择视频</div>
                    <div class="gif-size-select">
                        <span class="label">尺寸</span>
                        <select id="gifSizeSelect">
                            <option value="120">120</option>
                            <option value="240" selected>240 (推荐)</option>
                            <option value="320">320</option>
                            <option value="480">480</option>
                        </select>
                    </div>
                    <button class="gif-gen-btn" id="genGifBtn">⚡ 生成 GIF</button>
                </div>
                <div class="size-hint" style="margin-top:8px;">
                    📏 微信推荐 <strong>240×240</strong> · GIF 动图 ≤1MB 可直接播放
                </div>
            </div>

            <!-- ====== 仓库面板 ====== -->
            <div class="panel-content" id="panel-warehouse">
                <div class="panel-title">📦 表情仓库</div>
                <div class="warehouse-toolbar">
                    <span class="wh-info" id="whCount">共 0 个</span>
                    <div class="wh-actions">
                        <button id="downloadSelectedBtn">⬇️ 下载选中</button>
                        <button class="danger" id="deleteSelectedBtn">🗑️ 删除选中</button>
                        <button id="clearWarehouseBtn">清空全部</button>
                    </div>
                </div>
                <div class="wh-grid" id="whGrid">
                    <div class="wh-empty">✨ 还没有表情，制作后存到这里吧</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ----- DOM 引用 -----
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');
            const placeholder = document.getElementById('placeholderText');

            const imageUpload = document.getElementById('imageUpload');
            const uploadImageBtn = document.getElementById('uploadImageBtn');
            const clearImageBtn = document.getElementById('clearImageBtn');

            const textInput = document.getElementById('textInput');
            const addTextBtn = document.getElementById('addTextBtn');
            const textColor = document.getElementById('textColor');
            const strokeColor = document.getElementById('strokeColor');
            const boldCheck = document.getElementById('boldCheck');
            const strokeCheck = document.getElementById('strokeCheck');
            const fontSizeSlider = document.getElementById('fontSizeSlider');
            const fontSizeLabel = document.getElementById('fontSizeLabel');
            const textList = document.getElementById('textList');
            const textCount = document.getElementById('textCount');

            const sizeGroup = document.getElementById('sizeGroup');
            const bgGroup = document.getElementById('bgGroup');
            const qualityGroup = document.getElementById('qualityGroup');
            const exportBtn = document.getElementById('exportBtn');
            const previewBtn = document.getElementById('previewBtn');
            const saveToWarehouseBtn = document.getElementById('saveToWarehouseBtn');
            const sizeHint = document.getElementById('sizeHint');

            const videoUpload = document.getElementById('videoUpload');
            const gifStatus = document.getElementById('gifStatus');
            const gifSizeSelect = document.getElementById('gifSizeSelect');
            const genGifBtn = document.getElementById('genGifBtn');

            const whGrid = document.getElementById('whGrid');
            const whCount = document.getElementById('whCount');
            const clearWarehouseBtn = document.getElementById('clearWarehouseBtn');
            const downloadSelectedBtn = document.getElementById('downloadSelectedBtn');
            const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');

            const previewModal = document.getElementById('previewModal');
            const previewImage = document.getElementById('previewImage');
            const previewVideo = document.getElementById('previewVideo');
            const previewModalClose = document.getElementById('previewModalClose');

            const toastEl = document.getElementById('toast');

            // ----- 功能切换 -----
            const tabBtns = document.querySelectorAll('.tab-btn');
            const panels = {
                text: document.getElementById('panel-text'),
                export: document.getElementById('panel-export'),
                gif: document.getElementById('panel-gif'),
                warehouse: document.getElementById('panel-warehouse')
            };

            // ----- 状态 -----
            const state = {
                image: null,
                imageDataURL: null,
                texts: [],
                nextId: 1,
                selectedId: null,
                dragging: false,
                dragTargetId: null,
                dragOffsetX: 0,
                dragOffsetY: 0,
                canvasSize: 600,
                exportSize: 240,
                bgColor: 'transparent',
                quality: 'lossless',
                videoFile: null,
                videoURL: null,
                videoElement: null,
            };

            // ----- 工具 -----
            function showToast(msg, duration = 2600) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                clearTimeout(toastEl._timer);
                toastEl._timer = setTimeout(() => {
                    toastEl.classList.remove('show');
                }, duration);
            }

            // ================================================================
            //  绘图
            // ================================================================
            function drawScene() {
                const w = state.canvasSize;
                const h = state.canvasSize;
                ctx.clearRect(0, 0, w, h);

                // 透明网格背景 (仅在预览时显示，导出时不包含)
                drawCheckerboard(ctx, w, h);

                // 图片
                if (state.image) {
                    const img = state.image;
                    const iw = img.width;
                    const ih = img.height;
                    const scale = Math.min(w / iw, h / ih);
                    const dw = iw * scale;
                    const dh = ih * scale;
                    const dx = (w - dw) / 2;
                    const dy = (h - dh) / 2;
                    ctx.drawImage(img, dx, dy, dw, dh);
                }

                // 文字
                for (const t of state.texts) {
                    drawText(t);
                }

                placeholder.style.display = (state.image || state.texts.length > 0) ? 'none' : 'block';
            }

            // 绘制棋盘格，表示透明背景
            function drawCheckerboard(ctx, w, h) {
                const size = 20;
                ctx.save();
                for (let x = 0; x < w; x += size) {
                    for (let y = 0; y < h; y += size) {
                        const isEven = (Math.floor(x / size) + Math.floor(y / size)) % 2 === 0;
                        ctx.fillStyle = isEven ? 'rgba(200,200,200,0.15)' : 'rgba(240,240,240,0.15)';
                        ctx.fillRect(x, y, size, size);
                    }
                }
                ctx.restore();
            }

            function drawText(t) {
                const fontSize = t.fontSize || 32;
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let font = '';
                if (t.bold) font += 'bold ';
                font += fontSize + 'px "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif';
                ctx.font = font;

                if (t.stroke) {
                    ctx.lineWidth = Math.max(2, fontSize / 14);
                    ctx.strokeStyle = t.strokeColor || '#ffffff';
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    ctx.strokeText(t.text, t.x, t.y);
                }
                ctx.fillStyle = t.color || '#d45a7a';
                ctx.fillText(t.text, t.x, t.y);

                // 选中边框
                if (state.selectedId === t.id) {
                    const metrics = ctx.measureText(t.text);
                    const tw = metrics.width;
                    const th = fontSize * 1.2;
                    const pad = 8;
                    ctx.save();
                    ctx.strokeStyle = '#ff8da1';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 6]);
                    ctx.strokeRect(t.x - tw / 2 - pad, t.y - th / 2 - pad, tw + pad * 2, th + pad * 2);
                    ctx.restore();
                }
                ctx.restore();
            }

            function measureTextObj(t) {
                const fontSize = t.fontSize || 32;
                ctx.save();
                let font = '';
                if (t.bold) font += 'bold ';
                font += fontSize + 'px "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif';
                ctx.font = font;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const metrics = ctx.measureText(t.text);
                const width = metrics.width;
                const height = fontSize * 1.2;
                ctx.restore();
                return { width, height };
            }

            function hitTestText(mx, my) {
                for (let i = state.texts.length - 1; i >= 0; i--) {
                    const t = state.texts[i];
                    const size = measureTextObj(t);
                    const halfW = size.width / 2 + 12;
                    const halfH = size.height / 2 + 12;
                    if (mx >= t.x - halfW && mx <= t.x + halfW &&
                        my >= t.y - halfH && my <= t.y + halfH) {
                        return t.id;
                    }
                }
                return null;
            }

            // ================================================================
            //  文字管理
            // ================================================================
            function renderTextList() {
                textList.innerHTML = '';
                for (const t of state.texts) {
                    const tag = document.createElement('div');
                    tag.className = 'text-tag';
                    if (state.selectedId === t.id) tag.classList.add('active-tag');

                    const span = document.createElement('span');
                    span.className = 'tag-text';
                    span.textContent = t.text || '(空)';
                    tag.appendChild(span);

                    const del = document.createElement('span');
                    del.className = 'tag-del';
                    del.textContent = '×';
                    del.title = '删除';
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteText(t.id);
                    });
                    tag.appendChild(del);

                    tag.addEventListener('click', () => {
                        selectText(t.id);
                    });

                    textList.appendChild(tag);
                }
                textCount.textContent = state.texts.length;
            }

            function addText(text) {
                if (!text || text.trim() === '') {
                    showToast('请输入文字内容');
                    return;
                }
                const w = state.canvasSize;
                const h = state.canvasSize;
                const newText = {
                    id: state.nextId++,
                    text: text.trim(),
                    x: w / 2 + (Math.random() - 0.5) * 80,
                    y: h / 2 + (Math.random() - 0.5) * 80,
                    color: textColor.value,
                    bold: boldCheck.checked,
                    stroke: strokeCheck.checked,
                    strokeColor: strokeColor.value,
                    fontSize: parseInt(fontSizeSlider.value, 10) || 32,
                };
                state.texts.push(newText);
                selectText(newText.id);
                renderTextList();
                drawScene();
                showToast('✅ 已添加文字');
                textInput.value = '';
                textInput.focus();
            }

            function deleteText(id) {
                const idx = state.texts.findIndex(t => t.id === id);
                if (idx === -1) return;
                state.texts.splice(idx, 1);
                if (state.selectedId === id) {
                    state.selectedId = state.texts.length > 0 ? state.texts[state.texts.length - 1].id : null;
                }
                renderTextList();
                drawScene();
            }

            function selectText(id) {
                state.selectedId = id;
                const t = state.texts.find(t => t.id === id);
                if (t) {
                    textColor.value = t.color || '#d45a7a';
                    strokeColor.value = t.strokeColor || '#ffffff';
                    boldCheck.checked = t.bold || false;
                    strokeCheck.checked = t.stroke || false;
                    fontSizeSlider.value = t.fontSize || 32;
                    fontSizeLabel.textContent = t.fontSize || 32;
                }
                renderTextList();
                drawScene();
            }

            function updateSelectedStyle() {
                const t = state.texts.find(t => t.id === state.selectedId);
                if (!t) return;
                t.color = textColor.value;
                t.strokeColor = strokeColor.value;
                t.bold = boldCheck.checked;
                t.stroke = strokeCheck.checked;
                t.fontSize = parseInt(fontSizeSlider.value, 10) || 32;
                fontSizeLabel.textContent = t.fontSize;
                renderTextList();
                drawScene();
            }

            // ================================================================
            //  图片
            // ================================================================
            function loadImage(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        state.image = img;
                        state.imageDataURL = e.target.result;
                        drawScene();
                        showToast('✅ 图片已上传');
                    };
                    img.onerror = () => showToast('❌ 图片加载失败');
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            function clearImage() {
                state.image = null;
                state.imageDataURL = null;
                drawScene();
                showToast('已清除图片');
                imageUpload.value = '';
            }

            // ================================================================
            //  导出核心 —— 支持透明背景
            // ================================================================
            function getExportSettings() {
                let size = 240;
                const activeSize = sizeGroup.querySelector('.opt-btn.active');
                if (activeSize) size = parseInt(activeSize.dataset.value, 10);

                let bg = 'transparent';
                const activeBg = bgGroup.querySelector('.opt-btn.active');
                if (activeBg) bg = activeBg.dataset.value;

                let quality = 'lossless';
                const activeQ = qualityGroup.querySelector('.opt-btn.active');
                if (activeQ) quality = activeQ.dataset.value;

                return { size, bg, quality };
            }

            // 渲染导出画布（用于导出和预览）
            function renderExportCanvas(size, bg, quality) {
                const offscreen = document.createElement('canvas');
                offscreen.width = size;
                offscreen.height = size;
                const offCtx = offscreen.getContext('2d');

                const srcSize = state.canvasSize;
                const scale = size / srcSize;

                // 绘制背景（根据选择）
                const isTransparent = (bg === 'transparent');
                if (!isTransparent) {
                    let bgColor = '#ffffff';
                    if (bg === 'pink') bgColor = '#fce8ee';
                    else if (bg === 'white') bgColor = '#ffffff';
                    offCtx.fillStyle = bgColor;
                    offCtx.fillRect(0, 0, size, size);
                }
                // 透明背景：不绘制任何背景

                // 绘制图片
                if (state.image) {
                    const img = state.image;
                    const iw = img.width;
                    const ih = img.height;
                    const s = Math.min(size / iw, size / ih);
                    const dw = iw * s;
                    const dh = ih * s;
                    const dx = (size - dw) / 2;
                    const dy = (size - dh) / 2;
                    offCtx.drawImage(img, dx, dy, dw, dh);
                }

                // 绘制文字
                for (const t of state.texts) {
                    const fs = Math.max(10, Math.round((t.fontSize || 32) * scale));
                    offCtx.save();
                    offCtx.textAlign = 'center';
                    offCtx.textBaseline = 'middle';
                    let font = '';
                    if (t.bold) font += 'bold ';
                    font += fs + 'px "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif';
                    offCtx.font = font;
                    const tx = t.x * scale;
                    const ty = t.y * scale;
                    if (t.stroke) {
                        offCtx.lineWidth = Math.max(1.5, fs / 14);
                        offCtx.strokeStyle = t.strokeColor || '#ffffff';
                        offCtx.lineJoin = 'round';
                        offCtx.lineCap = 'round';
                        offCtx.strokeText(t.text, tx, ty);
                    }
                    offCtx.fillStyle = t.color || '#d45a7a';
                    offCtx.fillText(t.text, tx, ty);
                    offCtx.restore();
                }

                return offscreen;
            }

            // 导出下载
            function exportImage() {
                const { size, bg, quality } = getExportSettings();
                const offscreen = renderExportCanvas(size, bg, quality);

                let mimeType = 'image/png';
                let qualityParam = undefined;
                let ext = 'png';

                if (quality === 'lossless') {
                    mimeType = 'image/png';
                    ext = 'png';
                } else if (quality === 'compressed') {
                    if (bg === 'transparent') {
                        mimeType = 'image/png';
                        ext = 'png';
                    } else {
                        mimeType = 'image/jpeg';
                        qualityParam = 0.75;
                        ext = 'jpg';
                    }
                } else { // low
                    if (bg === 'transparent') {
                        mimeType = 'image/png';
                        ext = 'png';
                    } else {
                        mimeType = 'image/jpeg';
                        qualityParam = 0.30;
                        ext = 'jpg';
                    }
                }

                offscreen.toBlob((blob) => {
                    if (!blob) { showToast('❌ 导出失败'); return; }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const bgLabel = bg === 'transparent' ? '透明' : (bg === 'pink' ? '粉' : '白');
                    const qLabel = quality === 'lossless' ? '无损' : (quality === 'compressed' ? '压缩' : '渣图');
                    a.download = `表情_${size}x${size}_${bgLabel}_${qLabel}.${ext}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                    showToast(`✅ 已下载 ${size}x${size} ${bgLabel}背景 ${qLabel}`);
                }, mimeType, qualityParam);
            }

            // 预览保存（在新窗口/模态框打开，方便长按保存）
            function previewExport() {
                const { size, bg, quality } = getExportSettings();
                const offscreen = renderExportCanvas(size, bg, quality);

                let mimeType = 'image/png';
                let qualityParam = undefined;

                if (quality === 'lossless') {
                    mimeType = 'image/png';
                } else if (quality === 'compressed') {
                    if (bg === 'transparent') {
                        mimeType = 'image/png';
                    } else {
                        mimeType = 'image/jpeg';
                        qualityParam = 0.75;
                    }
                } else {
                    if (bg === 'transparent') {
                        mimeType = 'image/png';
                    } else {
                        mimeType = 'image/jpeg';
                        qualityParam = 0.30;
                    }
                }

                offscreen.toBlob((blob) => {
                    if (!blob) { showToast('❌ 预览失败'); return; }
                    const url = URL.createObjectURL(blob);
                    // 使用模态框展示
                    previewImage.src = url;
                    previewImage.style.display = 'block';
                    previewVideo.style.display = 'none';

                    previewModal.classList.add('active');

                    previewModal.onclick = (e) => {
                        if (e.target === previewModal) {
                            closePreviewModal();
                        }
                    };
                    // 清理 URL
                    const cleanup = () => {
                        setTimeout(() => URL.revokeObjectURL(url), 10000);
                    };
                    cleanup();
                }, mimeType, qualityParam);
            }

            function closePreviewModal() {
                previewModal.classList.remove('active');
                previewImage.style.display = 'none';
                previewImage.src = '';
                previewVideo.style.display = 'none';
                previewVideo.src = '';
                previewVideo.pause();
            }

            // 保存到仓库
            function saveToWarehouse() {
                const { size, bg, quality } = getExportSettings();
                const offscreen = renderExportCanvas(size, bg, quality);

                offscreen.toBlob((blob) => {
                    if (!blob) { showToast('❌ 保存失败'); return; }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const items = getWarehouseItems();
                        items.push({
                            type: 'image',
                            data: e.target.result,
                            size: size,
                            bg: bg,
                            time: Date.now(),
                        });
                        saveWarehouseItems(items);
                        renderWarehouse();
                        showToast('📦 已存入仓库');
                    };
                    reader.readAsDataURL(blob);
                }, 'image/png');
            }

            //  仓库
            // ================================================================

                localStorage.setItem('emoji_warehouse', JSON.stringify(items));

                        video.autoplay = true;
                        video.playsInline = true;
                        video.onmouseenter = () => video.play();
                        video.onmouseleave = () => video.pause();
                        div.appendChild(video);
                    } else {

                    // 尺寸标签

                    sizeBadge.textContent = `${item.size || 240}px`;
                    div.appendChild(sizeBadge);

                    // 下载
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'wh-download';
                    downloadBtn.textContent = '⬇️';
                    downloadBtn.title = '下载到本地';
                    downloadBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const link = document.createElement('a');
                        link.href = item.data;
                        const ext = item.type === 'gif' ? 'gif' : 'png';
                        link.download = `表情_${item.size || 240}.${ext}`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        showToast('⬇️ 已下载');

                    del.className = 'wh-del';

                    div.addEventListener('click', () => {

                                if (e.target === previewModal) closePreviewModal();
                            };

                            previewImage.src = item.data;
                            previewImage.style.display = 'block';
                            previewVideo.style.display = 'none';
                            previewVideo.pause();

            function getSelectedIndices() {

            function downloadSelected() {
                const items = getWarehouseItems();
                const indices = getSelectedIndices();
                if (indices.length === 0) { showToast('请先勾选要下载的表情'); return; }
                indices.forEach(idx => {

                        document.body.removeChild(link);

            function deleteSelected() {
                const items = getWarehouseItems();
                const indices = getSelectedIndices();
                if (indices.length === 0) { showToast('请先勾选要删除的表情'); return; }
                if (!confirm(`确定删除选中的 ${indices.length} 个表情吗？`)) return;
